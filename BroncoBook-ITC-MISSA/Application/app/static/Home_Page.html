<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BroncoBook Campus Knowledge Agent</title>
    <link rel="stylesheet" href="/static/BroncoBook.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <div class="header-title-group">
            <h1 class="header-title">BroncoBook Campus Knowledge Agent</h1>
            <p class="header-subtitle">Ask about admissions, deadlines, housing, and campus services.</p>
          </div>
          <div class="status-badge">
            <span id="healthStatus">Checking...</span>
            <strong id="activeModel">Loading model...</strong>
          </div>
        </div>
        <div class="border-strip"></div>
      </header>

      <main>
        <section class="search-section">
          <form id="chatForm" class="search-form">
            <textarea
              id="messageInput"
              class="search-input"
              rows="2"
              aria-label="Ask the campus knowledge agent"
              placeholder="Ask a question about the university website..."
            ></textarea>
            <button type="submit" class="search-button">Send</button>
          </form>
          <div id="starterQuestions" class="topics-row chips"></div>
        </section>

        <section id="messages" class="messages"></section>
      </main>
    </div>

    <template id="messageTemplate">
      <article class="message-card">
        <div class="message-role"></div>
        <div class="message-body"></div>
        <div class="sources"></div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="/static/app.js" defer></script>
  </body>
</html>
